<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>NanoFlow SiYuan Relay</title>
    <style>
      body { margin: 0; padding: 20px; width: 360px; font: 14px/1.5 system-ui, sans-serif; color: #1f2937; }
      label { display: block; margin: 12px 0; font-weight: 700; }
      input { box-sizing: border-box; width: 100%; margin-top: 4px; padding: 8px; border: 1px solid #d1d5db; border-radius: 8px; }
      button { margin-right: 8px; padding: 8px 12px; border: 0; border-radius: 8px; background: #4f46e5; color: white; font-weight: 700; cursor: pointer; }
      button.secondary { background: #64748b; }
      #status { min-height: 20px; margin-top: 12px; font-size: 12px; color: #475569; }
      .hint { font-size: 12px; color: #64748b; }
    </style>
  </head>
  <body>
    <h1>NanoFlow SiYuan Relay</h1>
    <p class="hint">token 只保存在当前浏览器扩展本机存储，不会返回 NanoFlow 页面。</p>
    <label>
      思源本地地址
      <input id="baseUrl" type="url" autocomplete="off" placeholder="http://127.0.0.1:6806" />
    </label>
    <label>
      思源 API Token
      <input id="token" type="password" autocomplete="off" />
    </label>
    <button id="save" type="button">保存</button>
    <button id="clear" class="secondary" type="button">清除授权</button>
    <div id="status" role="status" aria-live="polite"></div>
    <script src="options.js" type="module"></script>
  </body>
</html>
