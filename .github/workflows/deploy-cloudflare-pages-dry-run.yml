name: Cloudflare Pages Dry Run

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: cf-pages-dryrun-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  WRANGLER_VERSION: '3.114.0'
  ENABLE_SENTRY_SOURCEMAPS: 'false'

jobs:
  dry-run:
    name: Build, Determinism, Local Pages Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Test contracts
        run: npm run test:contracts

      - name: Validate env flags drift
        run: npm run quality:guard:env-flags

      - name: Deterministic build guard
        env:
          NG_APP_SUPABASE_URL: 'https://dryrun.invalid'
          NG_APP_SUPABASE_ANON_KEY: 'dryrun-placeholder-with-enough-length-for-build-validation-000000000000000000000000000000000000000000'
          NG_APP_SENTRY_ENVIRONMENT: 'preview'
          NG_APP_CANONICAL_ORIGIN: ''
          NG_APP_ORIGIN_GATE_MODE: 'off'
          NG_APP_READ_ONLY_PREVIEW: 'true'
          NG_APP_DEPLOYMENT_TARGET: 'preview-dryrun'
          NG_APP_SUPABASE_PROJECT_ALIAS: 'preview-dryrun'
          NG_APP_SENTRY_RELEASE: ${{ github.sha }}
          DEPLOYMENT_TARGET: 'preview-dryrun'
          SUPABASE_PROJECT_ALIAS: 'preview-dryrun'
          SENTRY_RELEASE: ${{ github.sha }}
        run: npm run quality:guard:build-deterministic

      - name: Install Cloudflare headers
        run: |
          set -euo pipefail
          cp public/_headers dist/browser/_headers
          if [ -f public/_redirects ]; then
            echo "::error::public/_redirects must remain absent; default Pages SPA fallback is used instead"
            exit 1
          fi

      - name: Validate deploy artifacts
        env:
          ANDROID_TWA_PACKAGE_NAME: ${{ vars.ANDROID_TWA_PACKAGE_NAME || 'app.nanoflow.twa' }}
          ANDROID_TWA_SHA256_FINGERPRINTS: ${{ vars.ANDROID_TWA_SHA256_FINGERPRINTS || '' }}
        run: npm run quality:guard:deploy-artifacts

      - name: Ensure no sourcemaps are deployable
        run: |
          set -euo pipefail
          if find dist/browser -name "*.map" | grep -q .; then
            echo "::error::Found .map files in dist/browser"
            find dist/browser -name "*.map"
            exit 1
          fi

      - name: Run local Cloudflare Pages smoke
        run: |
          set -euo pipefail
          npx --yes wrangler@3.114.0 pages dev dist/browser --port 8788 --ip 127.0.0.1 > /tmp/nanoflow-wrangler-pages.log 2>&1 &
          pid=$!
          trap 'kill $pid 2>/dev/null || true; cat /tmp/nanoflow-wrangler-pages.log || true' EXIT
          for attempt in $(seq 1 30); do
            if curl -sS -o /dev/null -w '%{http_code}' --max-time 3 http://127.0.0.1:8788/ | grep -q '^200$'; then
              break
            fi
            sleep 2
          done
          bash scripts/smoke/cloudflare-header-smoke.sh http://127.0.0.1:8788

      - name: Summary
        run: |
          echo "## Cloudflare dry-run summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- files: $(find dist/browser -type f | wc -l)" >> "$GITHUB_STEP_SUMMARY"
          echo "- size: $(du -sk dist/browser | awk '{print $1}') KB" >> "$GITHUB_STEP_SUMMARY"
          echo "- header rules: $(grep -cE '^/[^[:space:]]' dist/browser/_headers || echo 0)" >> "$GITHUB_STEP_SUMMARY"
          echo "- deterministic guard: passed" >> "$GITHUB_STEP_SUMMARY"
          echo "- local Pages smoke: passed" >> "$GITHUB_STEP_SUMMARY"
