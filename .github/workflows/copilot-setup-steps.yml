name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - package.json
      - package-lock.json
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - package.json
      - package-lock.json

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Configure optional npm auth for private packages
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "::add-mask::$NPM_TOKEN"
            if ! npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN" >/dev/null 2>&1; then
              echo "::error::Failed to configure npm authentication from NPM_TOKEN."
              exit 1
            fi
          else
            echo "NPM_TOKEN not configured; continuing without private npm package auth."
          fi

      - name: Restore Playwright browser cache (ubuntu-latest)
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: |
          npm ci --prefer-offline || {
            echo "::warning::npm ci --prefer-offline failed; retrying npm ci without cache preference to rule out stale or incomplete cache."
            npm ci
          }

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Print environment info
        shell: bash
        run: |
          node --version
          npm --version
          npx playwright --version
