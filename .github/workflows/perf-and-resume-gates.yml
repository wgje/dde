name: perf-and-resume-gates

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

jobs:
  perf-and-resume-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      perf_auth_available: ${{ steps.perf_auth.outputs.available }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Encoding Corruption Guard
        run: npm run quality:guard:encoding

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build Perf Guard
        run: npm run perf:guard

      - name: Hotpath Config Barrel Ban
        env:
          HOTPATH_CONFIG_BARREL_BAN_ENABLED: 'true'
        run: node scripts/perf-startup-guard.cjs

      - name: Resume Core Tests
        run: >-
          npx vitest run
          src/app/core/services/simple-sync.service.spec.ts
          src/services/app-lifecycle-orchestrator.service.spec.ts
          src/services/event-driven-sync-pulse.service.spec.ts
          src/services/sync-coordinator.service.spec.ts
          src/services/remote-change-handler.service.spec.ts

      - name: Detect Perf Auth Env
        id: perf_auth
        env:
          E2E_PERF_EMAIL: ${{ secrets.E2E_PERF_EMAIL }}
          E2E_PERF_PASSWORD: ${{ secrets.E2E_PERF_PASSWORD }}
        run: |
          if [ -n "$E2E_PERF_EMAIL" ] && [ -n "$E2E_PERF_PASSWORD" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Perf auth secrets detected."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Missing E2E_PERF_EMAIL/E2E_PERF_PASSWORD; skipping authenticated perf E2E and no-regression artifact chain."
          fi

      - name: Perf Auth Gate Summary
        if: ${{ steps.perf_auth.outputs.available != 'true' }}
        run: |
          {
            echo "### Perf Auth Gate Skipped"
            echo
            echo "- Missing E2E_PERF_EMAIL / E2E_PERF_PASSWORD secrets."
            echo "- Build perf guard and resume core tests still ran."
            echo "- Authenticated weak-network E2E, metrics artifact upload, and no-regression guard were skipped."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Weak Network E2E Budget
        id: perf_e2e
        if: ${{ steps.perf_auth.outputs.available == 'true' }}
        env:
          PERF_BUDGET_TEST: '1'
          PLAYWRIGHT_WEB_SERVER_COMMAND: python3 -m http.server 4200 --directory dist/browser
          PLAYWRIGHT_WEB_SERVER_TIMEOUT: '120000'
          E2E_PERF_EMAIL: ${{ secrets.E2E_PERF_EMAIL }}
          E2E_PERF_PASSWORD: ${{ secrets.E2E_PERF_PASSWORD }}
          E2E_PERF_PROJECT_ID: ${{ secrets.E2E_PERF_PROJECT_ID }}
        run: >-
          npx playwright test
          e2e/perf/weak-network-startup.spec.ts
          e2e/weak-network-budget.spec.ts
          e2e/perf/resume-budget.spec.ts

      - name: Detect Perf Metrics Snapshot
        id: perf_metrics
        if: ${{ always() && steps.perf_auth.outputs.available == 'true' }}
        run: |
          if [ -f test-results/perf/current-metrics.json ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Perf metrics snapshot detected."
            exit 0
          fi

          if [ "${{ steps.perf_e2e.conclusion }}" = "success" ]; then
            echo "::error::Perf metrics snapshot missing after successful authenticated perf E2E."
            exit 1
          fi

          echo "ready=false" >> "$GITHUB_OUTPUT"
          echo "::warning::Perf E2E did not complete successfully, so metrics snapshot is unavailable."

      - name: Upload Perf Metrics Snapshot
        if: ${{ always() && steps.perf_metrics.outputs.ready == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: perf-current-metrics
          path: test-results/perf/current-metrics.json
          if-no-files-found: error

  no-regression-guard:
    if: ${{ needs.perf-and-resume-gates.result == 'success' && needs.perf-and-resume-gates.outputs.perf_auth_available == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - perf-and-resume-gates

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download Perf Metrics Snapshot
        uses: actions/download-artifact@v4
        with:
          name: perf-current-metrics
          path: test-results/perf

      - name: Build Stats For Regression Guard
        run: npm run build:dev -- --stats-json

      - name: No Regression Guard
        run: npm run perf:guard:no-regression
