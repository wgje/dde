name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'preview'
        type: choice
        options: [production, preview]
      deploy:
        description: 'Actually upload to Cloudflare Pages'
        required: true
        default: false
        type: boolean

concurrency:
  group: cf-pages-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  WRANGLER_VERSION: '3.114.0'
  ENABLE_SENTRY_SOURCEMAPS: 'false'
  CANONICAL_PRODUCTION_ORIGIN: ${{ vars.CANONICAL_PRODUCTION_ORIGIN || 'https://nanoflow.pages.dev' }}
  READ_ONLY_PREVIEW: ${{ vars.READ_ONLY_PREVIEW || 'true' }}

jobs:
  test:
    name: Test Without Deploy Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run contracts and local matrix
        run: npm run test:run

  build-deploy:
    name: Build, Validate, Deploy
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    environment:
      name: ${{ (github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.target == 'preview')) && 'NanoFlow-Preview' || '' }}
    if: >-
      ${{
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
      }}
    env:
      DEPLOYMENT_TARGET: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && 'production' || (github.event_name == 'workflow_dispatch' && inputs.target == 'production' && 'production' || 'preview') }}
      GITHUB_ENVIRONMENT_NAME: ${{ (github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.target == 'preview')) && 'NanoFlow-Preview' || '' }}
      SHOULD_DEPLOY: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'pull_request' || github.event.inputs.deploy == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Select Supabase build env
        id: supabase
        env:
          NG_APP_SUPABASE_URL: ${{ secrets.NG_APP_SUPABASE_URL }}
          NG_APP_SUPABASE_ANON_KEY: ${{ secrets.NG_APP_SUPABASE_ANON_KEY }}
          NG_APP_SENTRY_DSN: ${{ secrets.NG_APP_SENTRY_DSN }}
        run: |
          set -euo pipefail
          if [ "$DEPLOYMENT_TARGET" = "production" ] && [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::Production workflow_dispatch deploy/build must run from main"
            exit 1
          fi

          secret_source="Repository secrets"
          if [ -n "${GITHUB_ENVIRONMENT_NAME:-}" ]; then
            secret_source="GitHub Environment '$GITHUB_ENVIRONMENT_NAME'"
          fi

          if [ -z "${NG_APP_SUPABASE_URL:-}" ] || [ -z "${NG_APP_SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::$secret_source must define NG_APP_SUPABASE_URL and NG_APP_SUPABASE_ANON_KEY"
            exit 1
          fi

          if [ -z "${NG_APP_SENTRY_DSN:-}" ]; then
            echo "::error::$secret_source must define NG_APP_SENTRY_DSN so Sentry error capture is active on Cloudflare"
            exit 1
          fi

          node -e "const dsn = process.env.NG_APP_SENTRY_DSN || ''; const allowedHost = 'o4508391513718784.ingest.us.sentry.io'; try { const url = new URL(dsn); const valid = url.protocol === 'https:' && /^[a-f0-9]{32}$/i.test(url.username) && url.password === '' && url.hostname === allowedHost && /^\\/\\d+\\/?$/.test(url.pathname); process.exit(valid ? 0 : 1); } catch { process.exit(1); }" || {
            echo "::error::$secret_source NG_APP_SENTRY_DSN must be a valid public https Sentry browser DSN without a secret for o4508391513718784.ingest.us.sentry.io"
            exit 1
          }

          if [ "$DEPLOYMENT_TARGET" = "production" ]; then
            echo "alias=production" >> "$GITHUB_OUTPUT"
          else
            echo "alias=preview" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate env flags drift
        run: npm run quality:guard:env-flags

      - name: Build
        env:
          NG_APP_SUPABASE_URL: ${{ secrets.NG_APP_SUPABASE_URL }}
          NG_APP_SUPABASE_ANON_KEY: ${{ secrets.NG_APP_SUPABASE_ANON_KEY }}
          NG_APP_SENTRY_DSN: ${{ secrets.NG_APP_SENTRY_DSN }}
          NG_APP_GOJS_LICENSE_KEY: ${{ secrets.NG_APP_GOJS_LICENSE_KEY }}
          NG_APP_SENTRY_ENVIRONMENT: ${{ env.DEPLOYMENT_TARGET }}
          NG_APP_CANONICAL_ORIGIN: ${{ env.DEPLOYMENT_TARGET == 'production' && env.CANONICAL_PRODUCTION_ORIGIN || '' }}
          NG_APP_ORIGIN_GATE_MODE: ${{ env.DEPLOYMENT_TARGET == 'production' && 'redirect' || 'read-only' }}
          NG_APP_READ_ONLY_PREVIEW: ${{ env.DEPLOYMENT_TARGET == 'preview' && env.READ_ONLY_PREVIEW || 'false' }}
          NG_APP_DEPLOYMENT_TARGET: ${{ env.DEPLOYMENT_TARGET }}
          NG_APP_SUPABASE_PROJECT_ALIAS: ${{ steps.supabase.outputs.alias }}
          NG_APP_SENTRY_RELEASE: ${{ github.sha }}
          DEPLOYMENT_TARGET: ${{ env.DEPLOYMENT_TARGET }}
          SUPABASE_PROJECT_ALIAS: ${{ steps.supabase.outputs.alias }}
          SENTRY_RELEASE: ${{ github.sha }}
        run: npm run build:strict

      - name: Run deployment quality guards
        run: |
          set -euo pipefail
          npm run perf:guard:nojit
          npm run quality:guard:font-contract
          npm run quality:guard:supabase-ready

      - name: Assert sourcemaps are not deployed
        run: |
          set -euo pipefail
          if [ "$ENABLE_SENTRY_SOURCEMAPS" != "false" ]; then
            echo "::error::ENABLE_SENTRY_SOURCEMAPS must remain false for first Cloudflare migration"
            exit 1
          fi
          if find dist/browser -name "*.map" | grep -q .; then
            echo "::error::Found .map files in dist/browser"
            find dist/browser -name "*.map"
            exit 1
          fi

      - name: Install Cloudflare headers
        run: |
          set -euo pipefail
          cp public/_headers dist/browser/_headers
          if [ "$DEPLOYMENT_TARGET" = "preview" ]; then
            cat >> dist/browser/_headers <<'EOF'

          /*
            X-Robots-Tag: noindex, nofollow
          EOF
          fi
          if [ -f public/_redirects ]; then
            echo "::error::public/_redirects is intentionally absent; explicit wildcard fallback would hide missing static assets"
            exit 1
          fi

      - name: Generate artifact manifest
        run: node scripts/generate-artifact-manifest.cjs

      - name: Prepare artifact trend baseline
        run: |
          set -euo pipefail
          mkdir -p tmp
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            BASE_REF="${{ github.event.before }}"
          else
            BASE_REF="origin/main"
          fi
          if ! git show "$BASE_REF:docs/cloudflare-artifact-baseline.json" > tmp/cloudflare-artifact-baseline.json 2>/dev/null; then
            rm -f tmp/cloudflare-artifact-baseline.json
            echo "No artifact trend baseline found at $BASE_REF"
          fi

      - name: Check artifact trends
        run: npm run quality:guard:artifact-trends -- --baseline=tmp/cloudflare-artifact-baseline.json --allow-missing-baseline

      - name: Validate deploy artifacts
        env:
          ANDROID_TWA_PACKAGE_NAME: ${{ vars.ANDROID_TWA_PACKAGE_NAME || 'app.nanoflow.twa' }}
          ANDROID_TWA_EXPECTED_SHA256_CERT_FINGERPRINTS: ${{ vars.ANDROID_TWA_EXPECTED_SHA256_CERT_FINGERPRINTS || vars.ANDROID_TWA_SHA256_FINGERPRINTS || '' }}
        run: npm run quality:guard:deploy-artifacts

      - name: Artifact summary
        run: |
          echo "## Cloudflare Pages artifact summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| target | $DEPLOYMENT_TARGET |" >> "$GITHUB_STEP_SUMMARY"
          echo "| deploy | $SHOULD_DEPLOY |" >> "$GITHUB_STEP_SUMMARY"
          echo "| supabaseProjectAlias | ${{ steps.supabase.outputs.alias }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| files | $(find dist/browser -type f | wc -l) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| size | $(du -sk dist/browser | awk '{print $1}') KB |" >> "$GITHUB_STEP_SUMMARY"
          echo "| _headers rules | $(grep -cE '^/($|[^[:space:]])' dist/browser/_headers || echo 0) |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload trace artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-pages-${{ env.DEPLOYMENT_TARGET }}-${{ github.sha }}
          path: |
            dist/browser/version.json
            dist/browser/artifact-manifest.json
            dist/browser/_headers
            dist/browser/index.html
            dist/browser/ngsw.json
          retention-days: 14

      - name: Deploy to Cloudflare Pages
        id: deploy
        if: env.SHOULD_DEPLOY == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME || secrets.CLOUDFLARE_PAGES_PROJECT || vars.CLOUDFLARE_PAGES_PROJECT_NAME || vars.CLOUDFLARE_PAGES_PROJECT }}
          CF_COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title || 'workflow_dispatch' }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_PAGES_PROJECT_NAME:-}" ]; then
            if [[ "$CANONICAL_PRODUCTION_ORIGIN" =~ ^https://([a-zA-Z0-9-]+)\.pages\.dev/?$ ]]; then
              CLOUDFLARE_PAGES_PROJECT_NAME="${BASH_REMATCH[1]}"
              echo "::notice::Inferred Cloudflare Pages project name from CANONICAL_PRODUCTION_ORIGIN"
            fi
          fi

          for var in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_PAGES_PROJECT_NAME; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Missing required deploy value: $var"
              exit 1
            fi
          done

          if [ "$DEPLOYMENT_TARGET" = "production" ]; then
            npx --yes wrangler@${WRANGLER_VERSION} pages deployment list \
              --project-name="$CLOUDFLARE_PAGES_PROJECT_NAME" | head -40 || true
            BRANCH_FLAG="--branch=main"
          else
            PR_NUM="${{ github.event.pull_request.number }}"
            if [ -z "$PR_NUM" ]; then PR_NUM="${GITHUB_RUN_ID}"; fi
            BRANCH_FLAG="--branch=pr-$PR_NUM"
          fi

          deploy_output=""
          safe_commit_message="${CF_COMMIT_MESSAGE//$'\r'/ }"
          safe_commit_message="${safe_commit_message//$'\n'/ }"
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt/3"
            set +e
            deploy_output="$(npx --yes wrangler@${WRANGLER_VERSION} pages deploy dist/browser \
              --project-name="$CLOUDFLARE_PAGES_PROJECT_NAME" \
              $BRANCH_FLAG \
              --commit-hash="$GITHUB_SHA" \
              --commit-message="$safe_commit_message" 2>&1)"
            status=$?
            set -e
            echo "$deploy_output"
            if [ "$status" = "0" ]; then break; fi
            if [ "$attempt" = "3" ]; then exit "$status"; fi
            sleep $((attempt * 10))
          done

          deploy_url="$(echo "$deploy_output" | grep -oE 'https://[a-zA-Z0-9.-]+\.pages\.dev' | head -n1)"
          if [ -z "$deploy_url" ] && [ "$DEPLOYMENT_TARGET" = "production" ]; then
            deploy_url="https://${CLOUDFLARE_PAGES_PROJECT_NAME}.pages.dev"
          fi
          echo "deploy_url=$deploy_url" >> "$GITHUB_OUTPUT"

      - name: Wait for edge health
        if: steps.deploy.outputs.deploy_url != ''
        run: |
          set -euo pipefail
          origin="${{ steps.deploy.outputs.deploy_url }}"
          for attempt in $(seq 1 30); do
            root_code="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 10 "$origin/" || echo 000)"
            version_json="$(curl -sS --max-time 10 "$origin/version.json" || true)"
            if [ "$root_code" = "200" ] && echo "$version_json" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const j=JSON.parse(s); if(!j.gitSha) process.exit(1)})" 2>/dev/null; then
              echo "Edge health OK at $origin"
              exit 0
            fi
            echo "Waiting for edge health ($attempt/30): /=$root_code version=${version_json:0:80}"
            sleep 5
          done
          echo "::error::Cloudflare Pages deployment did not become healthy"
          exit 1

      - name: Post-deploy header smoke
        if: steps.deploy.outputs.deploy_url != ''
        run: bash scripts/smoke/cloudflare-header-smoke.sh "${{ steps.deploy.outputs.deploy_url }}"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.deploy.outputs.deploy_url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '### Cloudflare Pages preview',
              '',
              `- URL: ${{ steps.deploy.outputs.deploy_url }}`,
              `- commit: \`${'${{ github.sha }}'.slice(0, 8)}\``,
              `- supabaseProjectAlias: \`${{ steps.supabase.outputs.alias }}\``,
              '- originGateMode: `read-only`',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
