name: Deploy to Cloudflare Pages

# §5.3 Cloudflare Pages 部署主 workflow
# - Production：push 到 main → 部署 production 分支（nanoflow.pages.dev）
# - Preview：pull_request opened/synchronize → 部署 PR preview（pr-<num>.nanoflow.pages.dev）
# - 同时落地 §5.3 / §16.8 / §16.9 / §16.13 / §16.17 / §16.27 校验

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target (production | preview)'
        required: true
        default: 'preview'
        type: choice
        options: [production, preview]

# 同一 PR / branch 进入新 commit 时取消旧的 in-progress run
concurrency:
  group: cf-pages-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  pull-requests: write
  id-token: write

env:
  NODE_VERSION: '22'
  # Sentry sourcemap 注入：本轮明确禁用（用户决策）
  ENABLE_SENTRY_SOURCEMAPS: 'false'
  # Canonical writable origin（用户决策）
  CANONICAL_PRODUCTION_ORIGIN: 'https://nanoflow.pages.dev'

jobs:
  build-and-deploy:
    name: Build, Validate, Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DEPLOYMENT_TARGET: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && 'production' || (github.event.inputs.target == 'production' && 'production' || 'preview') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # generate-version-json 需要 git SHA

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Verify required Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          set -e
          missing=0
          for var in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_PAGES_PROJECT; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required secret: $var"
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then exit 1; fi

      - name: Resolve Supabase project alias (per-environment)
        id: supabase
        env:
          # production 走主 Supabase（生产数据）
          PROD_SUPABASE_URL: ${{ secrets.NG_APP_SUPABASE_URL_PROD }}
          PROD_SUPABASE_ANON_KEY: ${{ secrets.NG_APP_SUPABASE_ANON_KEY_PROD }}
          # preview 走独立 Supabase 项目（用户决策：避免 Auth 跨域 + RLS 跨环境污染）
          PREVIEW_SUPABASE_URL: ${{ secrets.NG_APP_SUPABASE_URL_PREVIEW }}
          PREVIEW_SUPABASE_ANON_KEY: ${{ secrets.NG_APP_SUPABASE_ANON_KEY_PREVIEW }}
        run: |
          set -e
          if [ "$DEPLOYMENT_TARGET" = "production" ]; then
            if [ -z "$PROD_SUPABASE_URL" ] || [ -z "$PROD_SUPABASE_ANON_KEY" ]; then
              echo "::error::Production deploy requires NG_APP_SUPABASE_URL_PROD and NG_APP_SUPABASE_ANON_KEY_PROD secrets"
              exit 1
            fi
            echo "alias=production" >> "$GITHUB_OUTPUT"
            echo "supabase_url=$PROD_SUPABASE_URL" >> "$GITHUB_OUTPUT"
            echo "::add-mask::$PROD_SUPABASE_ANON_KEY"
            echo "supabase_anon_key=$PROD_SUPABASE_ANON_KEY" >> "$GITHUB_OUTPUT"
          else
            # Preview 必须使用独立项目（fail-fast，杜绝退化到 production 凭据）
            if [ -z "$PREVIEW_SUPABASE_URL" ] || [ -z "$PREVIEW_SUPABASE_ANON_KEY" ]; then
              echo "::error::Preview deploy requires NG_APP_SUPABASE_URL_PREVIEW and NG_APP_SUPABASE_ANON_KEY_PREVIEW secrets (separate Supabase project, per migration plan §16.6 / user decision)"
              exit 1
            fi
            echo "alias=preview" >> "$GITHUB_OUTPUT"
            echo "supabase_url=$PREVIEW_SUPABASE_URL" >> "$GITHUB_OUTPUT"
            echo "::add-mask::$PREVIEW_SUPABASE_ANON_KEY"
            echo "supabase_anon_key=$PREVIEW_SUPABASE_ANON_KEY" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Validate env flags drift
        run: npm run quality:guard:env-flags

      - name: Build (production / preview)
        env:
          NG_APP_SUPABASE_URL: ${{ steps.supabase.outputs.supabase_url }}
          NG_APP_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.supabase_anon_key }}
          NG_APP_SENTRY_DSN: ${{ secrets.NG_APP_SENTRY_DSN }}
          NG_APP_GOJS_LICENSE_KEY: ${{ secrets.NG_APP_GOJS_LICENSE_KEY }}
          NG_APP_SENTRY_ENVIRONMENT: ${{ env.DEPLOYMENT_TARGET }}
          NG_APP_CANONICAL_ORIGIN: ${{ env.DEPLOYMENT_TARGET == 'production' && env.CANONICAL_PRODUCTION_ORIGIN || '' }}
          # Production：硬重定向到 canonical（防 ghost write / 多 origin 写入）
          # Preview：read-only，避免 PR preview 写入污染数据
          NG_APP_ORIGIN_GATE_MODE: ${{ env.DEPLOYMENT_TARGET == 'production' && 'redirect' || 'read-only' }}
          NG_APP_READ_ONLY_PREVIEW: ${{ env.DEPLOYMENT_TARGET == 'preview' && 'true' || 'false' }}
          NG_APP_DEPLOYMENT_TARGET: ${{ env.DEPLOYMENT_TARGET }}
          NG_APP_SUPABASE_PROJECT_ALIAS: ${{ steps.supabase.outputs.alias }}
          NG_APP_SENTRY_RELEASE: ${{ github.sha }}
          DEPLOYMENT_TARGET: ${{ env.DEPLOYMENT_TARGET }}
          SUPABASE_PROJECT_ALIAS: ${{ steps.supabase.outputs.alias }}
          SENTRY_RELEASE: ${{ github.sha }}
        run: npm run build:strict

      - name: Sanity — Sentry sourcemap inject is disabled (user decision)
        run: |
          if [ "$ENABLE_SENTRY_SOURCEMAPS" != "false" ]; then
            echo "::error::ENABLE_SENTRY_SOURCEMAPS must be 'false' in this round (user decision)."
            exit 1
          fi
          # 二次保险：dist 里不能有 .map
          if find dist/browser -name "*.map" | grep -q .; then
            echo "::error::Found .map files in dist/browser despite sourcemap inject being disabled"
            find dist/browser -name "*.map"
            exit 1
          fi

      - name: Copy public/_headers into dist (Cloudflare Pages convention)
        run: |
          set -e
          if [ ! -f public/_headers ]; then
            echo "::error::public/_headers missing"
            exit 1
          fi
          cp public/_headers dist/browser/_headers
          # 可选：如果项目有 public/_redirects，也一并拷贝（当前未使用）
          if [ -f public/_redirects ]; then
            cp public/_redirects dist/browser/_redirects
          fi
          echo "✓ _headers copied to dist/browser"

      - name: Validate deploy artifacts (§5.3 / §16.8 / §16.9 / §16.13 / §16.17)
        run: npm run quality:guard:deploy-artifacts

      - name: Compute artifact summary
        id: artifact
        run: |
          set -e
          file_count=$(find dist/browser -type f | wc -l)
          total_size_kb=$(du -sk dist/browser | awk '{print $1}')
          rule_count=$(grep -cE '^/[^[:space:]]' dist/browser/_headers || echo 0)
          echo "file_count=$file_count" >> "$GITHUB_OUTPUT"
          echo "total_size_kb=$total_size_kb" >> "$GITHUB_OUTPUT"
          echo "header_rule_count=$rule_count" >> "$GITHUB_OUTPUT"
          echo "## Cloudflare Pages artifact summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| target | $DEPLOYMENT_TARGET |" >> "$GITHUB_STEP_SUMMARY"
          echo "| supabaseProjectAlias | ${{ steps.supabase.outputs.alias }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| files | $file_count |" >> "$GITHUB_STEP_SUMMARY"
          echo "| size | ${total_size_kb} KB |" >> "$GITHUB_STEP_SUMMARY"
          echo "| _headers rules | $rule_count |" >> "$GITHUB_STEP_SUMMARY"
          echo "| sentry sourcemap inject | disabled |" >> "$GITHUB_STEP_SUMMARY"
          echo "| origin gate | ${{ env.DEPLOYMENT_TARGET == 'production' && 'redirect' || 'read-only' }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact for traceability
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-pages-${{ env.DEPLOYMENT_TARGET }}-${{ github.sha }}
          path: |
            dist/browser/version.json
            dist/browser/_headers
            dist/browser/index.html
            dist/browser/ngsw.json
          retention-days: 14

      - name: Deploy to Cloudflare Pages
        id: deploy
        if: env.DEPLOYMENT_TARGET == 'production' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          PROJECT="${{ secrets.CLOUDFLARE_PAGES_PROJECT }}"
          if [ "$DEPLOYMENT_TARGET" = "production" ]; then
            BRANCH_FLAG="--branch=main"
          else
            # Preview：使用 PR 号作为 branch，得到稳定子域 pr-<num>.<project>.pages.dev
            PR_NUM="${{ github.event.pull_request.number }}"
            if [ -z "$PR_NUM" ]; then PR_NUM="${GITHUB_RUN_ID}"; fi
            BRANCH_FLAG="--branch=pr-$PR_NUM"
          fi
          echo "Deploying to Cloudflare Pages project=$PROJECT branch=$BRANCH_FLAG"
          # 使用 wrangler 官方 action 包装也可，这里直接 npx 保持依赖最小
          OUTPUT=$(npx --yes wrangler@^3 pages deploy dist/browser \
            --project-name="$PROJECT" \
            $BRANCH_FLAG \
            --commit-hash="${{ github.sha }}" \
            --commit-message="${{ github.event.head_commit.message || github.event.pull_request.title || 'workflow_dispatch' }}" 2>&1) || { echo "$OUTPUT"; exit 1; }
          echo "$OUTPUT"
          DEPLOY_URL=$(echo "$OUTPUT" | grep -oE 'https://[a-zA-Z0-9.-]+\.pages\.dev' | head -n1)
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Post-deploy header smoke
        if: steps.deploy.outputs.deploy_url != ''
        run: |
          # 给 Cloudflare 全球边缘 5s 同步时间
          sleep 5
          bash scripts/smoke/cloudflare-header-smoke.sh "${{ steps.deploy.outputs.deploy_url }}"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.deploy.outputs.deploy_url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deploy_url }}';
            const sha = '${{ github.sha }}'.slice(0, 8);
            const alias = '${{ steps.supabase.outputs.alias }}';
            const body = [
              '### 🌥 Cloudflare Pages preview',
              '',
              `- URL: ${url}`,
              `- commit: \`${sha}\``,
              `- supabaseProjectAlias: \`${alias}\``,
              `- originGateMode: \`read-only\` (preview 禁止写入)`,
              '',
              '> 注意：此 preview 使用独立 Supabase project，与 production 数据隔离。',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
