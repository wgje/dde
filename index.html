  <!-- ========== Canonical Origin Gate (Cloudflare 迁移 §16.10 / §16.26) ========== -->
  <!-- 最早期同步脚本：早于 resource hints、modulepreload、Angular bootstrap、SW 注册与 Supabase 初始化。 -->
  <script id="canonical-origin-gate">
    (function() {
      try {
        var CANONICAL_ORIGIN = 'https://nanoflow.pages.dev';
        var ORIGIN_GATE_MODE = 'off';
        var EXPECTED_NGSW_HASH = '';
        var CLEANUP_PREFIX = 'nanoflow.originGate.cleanup';

        function writeGateMarker(mode) {
          window.__NANOFLOW_ORIGIN_GATE__ = {
            mode: mode,
            canonical: CANONICAL_ORIGIN,
            current: window.location.origin
          };
          try {
            sessionStorage.setItem('__NANOFLOW_WRITE_GUARD__', mode === 'redirect' ? 'export-only' : mode);
            sessionStorage.setItem('nanoflow.originGate.fired', JSON.stringify({
              from: window.location.origin,
              to: CANONICAL_ORIGIN,
              mode: mode,
              ts: new Date().toISOString()
            }));
          } catch (_e) { /* ignore */ }
        }

        function cleanupStaleSwAndCaches(reason, done) {
          var marker = CLEANUP_PREFIX + ':' + reason + ':' + window.location.origin;
          try {
            if (sessionStorage.getItem(marker) === 'done') {
              done();
              return;
            }
            sessionStorage.setItem(marker, 'started');
          } catch (_e) { /* ignore */ }

          var jobs = [];
          if ('serviceWorker' in navigator) {
            jobs.push(
              navigator.serviceWorker.getRegistrations()
                .then(function(regs) {
                  return Promise.all(regs.map(function(reg) {
                    try { return reg.unregister(); } catch (_e) { return false; }
                  }));
                })
                .catch(function() {})
            );
          }
          if ('caches' in window) {
            jobs.push(
              caches.keys()
                .then(function(names) {
                  return Promise.all(names.map(function(name) {
                    if (/ngsw|nanoflow|app-cache|workbox/i.test(name)) {
                      return caches.delete(name);
                    }
                    return false;
                  }));
                })
                .catch(function() {})
            );
          }

          Promise.race([
            Promise.all(jobs),
            new Promise(function(resolve) { setTimeout(resolve, 1200); })
          ]).then(function() {
            try { sessionStorage.setItem(marker, 'done'); } catch (_e) { /* ignore */ }
            done();
          });
        }

        function handleNgswHashMismatch(expectedHash) {
          if (!expectedHash || typeof expectedHash !== 'string') return false;
          var hash = expectedHash.trim();
          if (!hash) return false;

          var key = 'nanoflow.ngswHash';
          var previous = null;
          try { previous = localStorage.getItem(key); } catch (_e) { previous = null; }

          if (previous && previous !== hash) {
            writeGateMarker('export-only');
            cleanupStaleSwAndCaches('ngswHashMismatch', function() {
              try { localStorage.setItem(key, hash); } catch (_e) { /* ignore */ }
              window.location.reload();
            });
            return true;
          }

          try { localStorage.setItem(key, hash); } catch (_e) { /* ignore */ }
          return false;
        }

        function scheduleNgswHashProbe() {
          if (handleNgswHashMismatch(EXPECTED_NGSW_HASH)) return true;
          if (typeof fetch !== 'function' || window.location.protocol === 'file:') return false;

          fetch('/version.json', {
            cache: 'no-store',
            headers: { 'Cache-Control': 'no-store' }
          })
            .then(function(resp) { return resp && resp.ok ? resp.json() : null; })
            .then(function(version) {
              if (version && typeof version.ngswHash === 'string') {
                handleNgswHashMismatch(version.ngswHash);
              }
            })
            .catch(function() {});
          return false;
        }

        var forceSwReset = /(?:^|[?&])forceSwReset=1(?:&|$)/.test(window.location.search);
        if (forceSwReset) {
          writeGateMarker('export-only');
          cleanupStaleSwAndCaches('forceSwReset', function() {
            var cleanUrl = window.location.href.replace(/([?&])forceSwReset=1(&)?/, function(match, prefix, suffix) {
              return prefix === '?' && suffix ? '?' : (prefix === '?' ? '' : prefix);
            }).replace(/[?&]$/, '');
            window.location.replace(cleanUrl);
          });
          return;
        }

        if (scheduleNgswHashProbe()) return;

        if (!CANONICAL_ORIGIN) return;
        if (!ORIGIN_GATE_MODE || ORIGIN_GATE_MODE === 'off') return;
        if (window.location.origin === CANONICAL_ORIGIN) return;

        writeGateMarker(ORIGIN_GATE_MODE);

        if (ORIGIN_GATE_MODE === 'redirect') {
          cleanupStaleSwAndCaches('redirect', function() {
            var target = CANONICAL_ORIGIN + window.location.pathname + window.location.search + window.location.hash;
            window.location.replace(target);
          });
        }
      } catch (_e) {
        // gate 失败不能阻断首屏；后续 WriteGuard / GlobalErrorHandler 继续兜底。
      }
    })();
  </script>
  
  <!-- ========== 安全：Content Security Policy ========== -->
  <!-- 
    CSP 策略说明：
    - default-src 'self': 默认只允许同源资源
    - script-src: 允许内联脚本（Angular 需要）和 Cloudflare Pages 注入的 analytics beacon
    - style-src: 允许内联样式、CDN 字体样式和 Cloudflare 注入资源
    - font-src: 允许 CDN 字体和 data: URI
    - img-src: 允许 data: 和 blob: URI（用于图片处理）
    - connect-src: 允许 Supabase API、Sentry、Groq 和 Cloudflare analytics beacon
    - worker-src: 允许 Service Worker
    - manifest-src: 允许 PWA manifest（开发环境支持 Codespaces/远程 URL）
    
    注意：frame-ancestors 只能通过 HTTP 响应头设置（meta 标签中无效）
    生产环境通过 nginx/CDN 设置：Content-Security-Policy: frame-ancestors 'self'
  -->

  <!-- ========== 防闪屏脚本 (Anti-FOUC) ========== -->
  <!-- 必须是同步阻塞脚本，在 Angular 启动前确定颜色模式 -->
  <script>
    (function() {
      // 1. 尝试从 localStorage 读取用户偏好
      // 格式：尝试多种可能的键名以兼容不同用户状态
      var localPref = null;
      try {
        // 优先读取设备本地覆盖
        var localOverride = localStorage.getItem('nanoflow.colorMode.local');
        if (localOverride) {
          localPref = JSON.parse(localOverride);
        }
        // 如果没有本地覆盖，尝试读取通用偏好
        if (!localPref) {
          var keys = Object.keys(localStorage);
          for (var i = 0; i < keys.length; i++) {
            if (keys[i].indexOf('nanoflow.preference.') === 0 && keys[i].indexOf('.colorMode') > 0) {
              localPref = JSON.parse(localStorage.getItem(keys[i]));
              break;
            }
          }
        }
      } catch (e) { /* localStorage 不可用或 JSON 解析失败 */ }

      // 2. 检测系统偏好
      var systemPref = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';

      // 3. 决定最终模式：localOverride > cloudDefault > system
      var mode = localPref || 'system';
      if (mode === 'system') mode = systemPref;

      // 4. 立即应用到 DOM，防止白色闪屏
      document.documentElement.setAttribute('data-color-mode', mode);

      // 5. 暴露给 Angular 运行时使用
      window.__NANOFLOW_INITIAL_COLOR_MODE__ = mode;
      window.__NANOFLOW_SYSTEM_COLOR_MODE__ = systemPref;
    })();
  </script>

  <!-- LAUNCH_SHARED_LOADER_DISMISS_START -->
  <script>
    // 加载指示器消除逻辑
    // WorkspaceShell.ngAfterViewInit() 会直接隐藏 #initial-loader。
    // 此脚本仅作为兜底：Angular 完全无法启动时显示错误。
    (function() {
      var startTime = Date.now();
      var dismissed = false;

      function dismissLoader() {
        if (dismissed) return;
        dismissed = true;
        var loader = document.getElementById('initial-loader');
        if (loader) loader.style.display = 'none';
      }

      // 事件驱动：仅在 handoff/ready 阶段才隐藏（工作区视图已就绪）
      window.addEventListener('nanoflow:boot-stage', function(e) {
        var detail = e && e.detail;
        if (detail && (detail.stage === 'handoff' || detail.stage === 'ready')) {
          dismissLoader();
        }
      });

      // 兜底轮询 — 仅在 WorkspaceShell 真正渲染后才隐藏 loader
      // 不能仅靠 app-root.children.length > 0 判断，因为 AppComponent 模板
      // 只有一个空的 <div><router-outlet></div>，此时 WorkspaceShell 可能还未渲染
      var checkReady = function() {
        if (dismissed) return;

        // WorkspaceShell 已渲染（router-outlet 内有实质内容）
        var shellRoot = document.querySelector('app-workspace-shell');
        if (shellRoot && shellRoot.children.length > 0) {
          dismissLoader();
          return;
        }

        // 或者 boot-stage 全局标记已就绪
        if (window.__NANOFLOW_BOOT_STAGE__ === 'ready' || window.__NANOFLOW_BOOT_STAGE__ === 'handoff') {
          dismissLoader();
          return;
        }

        var elapsed = Date.now() - startTime;
        var statusEl = document.getElementById('loader-status');
        if (elapsed > 3000 && statusEl) statusEl.textContent = '加载中，请稍候...';
        if (elapsed > 6000 && statusEl) statusEl.textContent = '加载时间较长，可能是网络问题...';

        if (elapsed < 25000) {
          setTimeout(checkReady, 100);
        } else {
          // 超时 - 显示错误
          var loader = document.getElementById('initial-loader');
          if (loader) {
            loader.innerHTML = '<div style="text-align:center;padding:2rem;">' +
              '<h2 style="color:#dc2626;">加载超时</h2>' +
              '<p style="color:#666;margin:1rem 0;">应用加载时间过长，可能是缓存问题导致。</p>' +
              '<div style="display:flex;gap:0.5rem;justify-content:center;margin-top:1rem;flex-wrap:wrap;">' +
              '<button onclick="location.reload()" style="padding:0.5rem 1rem;background:#4f46e5;color:#fff;border:none;border-radius:4px;cursor:pointer;">刷新</button>' +
              '<button onclick="if(window.__NANOFLOW_FORCE_CLEAR_CACHE__)window.__NANOFLOW_FORCE_CLEAR_CACHE__();else{caches.keys().then(function(k){return Promise.all(k.map(function(n){return caches.delete(n)}))}).then(function(){location.reload()})}" style="padding:0.5rem 1rem;background:#dc2626;color:#fff;border:none;border-radius:4px;cursor:pointer;">清除缓存</button>' +
              '</div></div>';
          }
        }
      };

      setTimeout(checkReady, 100);
    })();
  </script>
