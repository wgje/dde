  <!-- ========== 安全：Content Security Policy ========== -->
  <!-- 
    CSP 策略说明：
    - default-src 'self': 默认只允许同源资源
    - script-src: 允许内联脚本（Angular 需要）
    - style-src: 允许内联样式和 CDN 字体样式
    - font-src: 允许 CDN 字体和 data: URI
    - img-src: 允许 data: 和 blob: URI（用于图片处理）
    - connect-src: 允许 Supabase API 和 Sentry
    - worker-src: 允许 Service Worker
    - manifest-src: 允许 PWA manifest（开发环境支持 Codespaces/远程 URL）
    
    注意：frame-ancestors 只能通过 HTTP 响应头设置（meta 标签中无效）
    生产环境通过 nginx/CDN 设置：Content-Security-Policy: frame-ancestors 'self'
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline';
    style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
    font-src 'self' https://cdn.jsdelivr.net data:;
    img-src 'self' data: blob: https://*.supabase.co;
    connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.sentry.io https://api.groq.com;
    worker-src 'self' blob:;
    manifest-src 'self' https://github.dev https://*.github.dev https://*.app.github.dev;
    base-uri 'self';
    form-action 'self';
  ">

  <!-- ========== 防闪屏脚本 (Anti-FOUC) ========== -->
  <!-- 必须是同步阻塞脚本，在 Angular 启动前确定颜色模式 -->
  <script>
    (function() {
      // 1. 尝试从 localStorage 读取用户偏好
      // 格式：尝试多种可能的键名以兼容不同用户状态
      var localPref = null;
      try {
        // 优先读取设备本地覆盖
        var localOverride = localStorage.getItem('nanoflow.colorMode.local');
        if (localOverride) {
          localPref = JSON.parse(localOverride);
        }
        // 如果没有本地覆盖，尝试读取通用偏好
        if (!localPref) {
          var keys = Object.keys(localStorage);
          for (var i = 0; i < keys.length; i++) {
            if (keys[i].indexOf('nanoflow.preference.') === 0 && keys[i].indexOf('.colorMode') > 0) {
              localPref = JSON.parse(localStorage.getItem(keys[i]));
              break;
            }
          }
        }
      } catch (e) { /* localStorage 不可用或 JSON 解析失败 */ }

      // 2. 检测系统偏好
      var systemPref = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';

      // 3. 决定最终模式：localOverride > cloudDefault > system
      var mode = localPref || 'system';
      if (mode === 'system') mode = systemPref;

      // 4. 立即应用到 DOM，防止白色闪屏
      document.documentElement.setAttribute('data-color-mode', mode);

      // 5. 暴露给 Angular 运行时使用
      window.__NANOFLOW_INITIAL_COLOR_MODE__ = mode;
      window.__NANOFLOW_SYSTEM_COLOR_MODE__ = systemPref;
    })();
  </script>

  <!-- ========== 内联快照渲染器 (P0 2026-03-25) ========== -->
  <!-- 在 Angular 引导之前从 localStorage 读取启动快照并立即渲染项目摘要，
       消除 3-5 秒的「黑屏」感知。使用 textContent 避免 XSS。 -->
  <script>
    (function() {
      try {
        var raw = localStorage.getItem('nanoflow.launch-snapshot.v1');
        if (!raw) return; /* 无快照：保留默认的 shimmer 占位即可，不切换到传统骨架 */
        var snap = JSON.parse(raw);
        if (!snap || snap.version !== 1 || !Array.isArray(snap.projects) || snap.projects.length === 0) return;

        var container = document.getElementById('snapshot-projects');
        if (!container) return;

        /* 清空占位 shimmer */
        container.innerHTML = '';

        var max = Math.min(snap.projects.length, 4);
        for (var i = 0; i < max; i++) {
          var p = snap.projects[i];
          if (!p || typeof p.name !== 'string') continue;

          var card = document.createElement('article');
          card.className = 'lsh-project' + (p.id === snap.activeProjectId ? ' lsh-project--active' : '');

          var head = document.createElement('div');
          head.className = 'lsh-project-head';

          var nameEl = document.createElement('h2');
          nameEl.className = 'lsh-project-name';
          nameEl.textContent = p.name;
          head.appendChild(nameEl);

          var meta = document.createElement('span');
          meta.className = 'lsh-project-meta';
          meta.textContent = (p.openTaskCount || 0) + '/' + (p.taskCount || 0) + ' 待处理';
          head.appendChild(meta);
          card.appendChild(head);

          /* 最近任务 */
          if (Array.isArray(p.recentTasks) && p.recentTasks.length > 0) {
            var taskList = document.createElement('div');
            taskList.className = 'lsh-task-list';
            for (var j = 0; j < Math.min(p.recentTasks.length, 3); j++) {
              var t = p.recentTasks[j];
              if (!t || typeof t.title !== 'string') continue;
              var row = document.createElement('div');
              row.className = 'lsh-task';

              var dot = document.createElement('span');
              dot.className = 'lsh-task-dot' + (t.status === 'completed' ? ' lsh-task-dot--done' : '');
              row.appendChild(dot);

              var tid = document.createElement('span');
              tid.className = 'lsh-task-id';
              tid.textContent = t.displayId || '';
              row.appendChild(tid);

              var ttl = document.createElement('span');
              ttl.textContent = t.title;
              row.appendChild(ttl);

              taskList.appendChild(row);
            }
            card.appendChild(taskList);
          }

          container.appendChild(card);
        }

        /* 视图 / 时间标签 */
        var viewEl = document.getElementById('snapshot-view-label');
        if (viewEl) {
          viewEl.textContent = '视图：' + (snap.lastActiveView === 'flow' ? '流程图' : snap.lastActiveView === 'text' ? '文本' : '待恢复');
        }
        var savedEl = document.getElementById('snapshot-saved-label');
        if (savedEl && snap.savedAt) {
          try {
            var d = new Date(snap.savedAt);
            savedEl.textContent = '最近快照：' + d.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
          } catch (e) { /* ignore */ }
        }
      } catch (e) {
        /* localStorage / JSON 异常：退回到传统 shimmer 骨架 */
        var shell = document.getElementById('snapshot-shell');
        var shimmer = document.getElementById('shimmer-skeleton');
        if (shell) shell.style.display = 'none';
        if (shimmer) shimmer.className = 'active';
      }
    })();
  </script>

  <!-- ========== 从 <head> 移出的阻塞脚本（P0-3 性能优化 2026-03-25）========== -->

  <!-- ========== 性能优化：预热脚本（P0-2 从 <head> 移至骨架屏之后 2026-03-24）========== -->

  <!-- 启动壳优先：会话预热与数据预加载延后到 launch-shell/boot 完成后再 idle 执行 -->
  <script>
    (function() {
      window.__NANOFLOW_SESSION_PREWARM__ = window.__NANOFLOW_SESSION_PREWARM__ || { status: 'idle' };
      window.__PRELOADED_DATA__ = window.__PRELOADED_DATA__ || { serverTime: null, projects: null, timestamp: Date.now() };

      var hasScheduled = false;
      var hasExecuted = false;
      var fallbackTimer = null;

      var cleanup = function() {
        window.removeEventListener('nanoflow:boot-stage', handleBootStage);
        window.removeEventListener('nanoflow:bootstrap-complete', handleBootReady);
        if (fallbackTimer !== null) {
          clearTimeout(fallbackTimer);
          fallbackTimer = null;
        }
      };

      var scheduleDeferredStartup = function() {
        if (hasScheduled) return;
        hasScheduled = true;

        var runDeferredStartup = function() {
          if (hasExecuted) return;
          hasExecuted = true;
          startSessionPrewarm();
          startDataPreload();
        };

        if (typeof requestIdleCallback === 'function') {
          requestIdleCallback(function() {
            runDeferredStartup();
          }, { timeout: 2000 });
          return;
        }

        setTimeout(runDeferredStartup, 250);
      };

      var handleBootReady = function() {
        cleanup();
        scheduleDeferredStartup();
      };

      var handleBootStage = function(event) {
        var detail = event && event.detail;
        if (detail && (detail.stage === 'launch-shell' || detail.stage === 'handoff' || detail.stage === 'ready')) {
          handleBootReady();
        }
      };

      window.addEventListener('nanoflow:boot-stage', handleBootStage);
      window.addEventListener('nanoflow:bootstrap-complete', handleBootReady, { once: true });
      fallbackTimer = setTimeout(handleBootReady, 4000);

      function startSessionPrewarm() {
        var AUTH_KEY = 'sb-fkhihclpghmmtbbywvoj-auth-token';
        var SUPABASE_URL = 'YOUR_SUPABASE_URL';
        var SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

        if (!SUPABASE_URL || SUPABASE_URL === 'YOUR_SUPABASE_URL') return;
        if (!SUPABASE_ANON_KEY || SUPABASE_ANON_KEY === 'YOUR_SUPABASE_ANON_KEY') return;

        try {
          var raw = localStorage.getItem(AUTH_KEY);
          if (!raw) return;
          var authData = JSON.parse(raw);
          var refreshToken = null;
          if (authData && authData.refresh_token) {
            refreshToken = authData.refresh_token;
          } else if (authData && authData.currentSession && authData.currentSession.refresh_token) {
            refreshToken = authData.currentSession.refresh_token;
          }
          if (!refreshToken || typeof refreshToken !== 'string') return;

          var expiresAt = null;
          if (authData.expires_at) expiresAt = authData.expires_at;
          else if (authData.currentSession && authData.currentSession.expires_at) expiresAt = authData.currentSession.expires_at;

          if (typeof expiresAt === 'number') {
            if (expiresAt < 1e12) expiresAt = expiresAt * 1000;
            if (expiresAt > Date.now() + 600000) return;
          }

          window.__NANOFLOW_SESSION_PREWARM__.status = 'pending';

          fetch(SUPABASE_URL + '/auth/v1/token?grant_type=refresh_token', {
            method: 'POST',
            headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
            body: JSON.stringify({ refresh_token: refreshToken })
          }).then(function(resp) {
            if (!resp.ok) { window.__NANOFLOW_SESSION_PREWARM__.status = 'failed'; return; }
            return resp.json();
          }).then(function(data) {
            if (!data || !data.access_token) return;
            var newSession = {
              access_token: data.access_token,
              refresh_token: data.refresh_token || refreshToken,
              expires_in: data.expires_in,
              expires_at: Math.floor(Date.now() / 1000) + (data.expires_in || 3600),
              token_type: data.token_type || 'bearer',
              user: data.user || (authData && authData.user) || null
            };
            try { localStorage.setItem(AUTH_KEY, JSON.stringify(newSession)); } catch (e) {}
            window.__NANOFLOW_SESSION_PREWARM__.status = 'refreshed';
            window.__NANOFLOW_SESSION_PREWARM__.session = newSession;
          }).catch(function() { window.__NANOFLOW_SESSION_PREWARM__.status = 'failed'; });
        } catch (e) {}
      }

      function startDataPreload() {
        var runtimeFlags = window.__NANOFLOW_BOOT_FLAGS__ || {};
        var disableIndexPreload = typeof runtimeFlags.DISABLE_INDEX_DATA_PRELOAD_V1 === 'boolean'
          ? runtimeFlags.DISABLE_INDEX_DATA_PRELOAD_V1 : true;
        window.__NANOFLOW_PRELOAD_DISABLED__ = disableIndexPreload;
        if (disableIndexPreload) return;

        var nav = navigator || {};
        var connection = nav.connection || nav.mozConnection || nav.webkitConnection;
        var effectiveType = connection && connection.effectiveType ? String(connection.effectiveType) : '';
        var downlink = connection && typeof connection.downlink === 'number' ? connection.downlink : 0;
        var rtt = connection && typeof connection.rtt === 'number' ? connection.rtt : 0;
        var saveData = !!(connection && connection.saveData);
        var isConstrainedNetwork = saveData || effectiveType === '2g' || effectiveType === 'slow-2g' ||
          (downlink > 0 && downlink < 1.5) || rtt > 280;
        if (isConstrainedNetwork) return;

        var authToken = null;
        var tokenExpiresAt = null;
        try {
          var authKey = 'sb-fkhihclpghmmtbbywvoj-auth-token';
          var rawAuth = localStorage.getItem(authKey);
          if (rawAuth) {
            var authData = JSON.parse(rawAuth);
            var session = authData && (authData.currentSession || authData.session || authData);
            if (session && typeof session.access_token === 'string') {
              authToken = session.access_token;
              if (typeof session.expires_at === 'number') { tokenExpiresAt = session.expires_at; }
              else if (typeof session.expires_at === 'string') { var p = Date.parse(session.expires_at); if (!isNaN(p)) { tokenExpiresAt = Math.floor(p / 1000); } }
              else if (typeof authData.expiresAt === 'number') { tokenExpiresAt = authData.expiresAt; }
              else if (typeof session.expires_in === 'number') { tokenExpiresAt = Math.floor(Date.now() / 1000) + session.expires_in; }
            }
          }
        } catch (e) {}
        if (!authToken) return;
        if (typeof tokenExpiresAt === 'number') {
          if (tokenExpiresAt > 1000000000000) { tokenExpiresAt = Math.floor(tokenExpiresAt / 1000); }
          if (tokenExpiresAt <= Math.floor(Date.now() / 1000) + 300) return;
        } else { return; }

        window.__PRELOADED_DATA__.timestamp = Date.now();

        var supabaseUrl = 'YOUR_SUPABASE_URL';
        var supabaseAnonKey = 'YOUR_SUPABASE_ANON_KEY';
        var headers = { 'apikey': supabaseAnonKey, 'Authorization': 'Bearer ' + authToken, 'Content-Type': 'application/json' };
        var baseUrl = supabaseUrl + '/rest/v1';
        fetch(baseUrl + '/rpc/get_server_time', { method: 'POST', headers: headers })
          .then(function(r) { if (!r.ok) return null; return r.json(); })
          .then(function(data) { if (data && window.__PRELOADED_DATA__) { window.__PRELOADED_DATA__.serverTime = data; } })
          .catch(function() {});
        fetch(baseUrl + '/projects?select=id,title,updated_at&order=updated_at.desc', { headers: headers })
          .then(function(r) { if (!r.ok) return null; return r.json(); })
          .then(function(data) { if (data && window.__PRELOADED_DATA__) { window.__PRELOADED_DATA__.projects = data; } })
          .catch(function() {});
      }
    })();
  </script>

  <script>
    // 启动壳就绪检测 — 事件驱动 + 轮询双保险 (P0 2026-03-25)
    (function() {
      var startTime = Date.now();
      var dismissed = false;
      
      function dismissLoader() {
        if (dismissed) return;
        dismissed = true;
        var loader = document.getElementById('initial-loader');
        if (loader && !loader.classList.contains('fade-out')) {
          loader.classList.add('fade-out');
          setTimeout(function() {
            loader.style.display = 'none';
            window.dispatchEvent(new CustomEvent('nanoflow:loader-hidden'));
          }, 200);
        }
      }
      
      // 主路径：监听 BootStageService 发出的事件，0 延迟响应
      window.addEventListener('nanoflow:boot-stage', function(e) {
        var detail = e && e.detail;
        if (detail && (detail.stage === 'launch-shell' || detail.stage === 'handoff' || detail.stage === 'ready')) {
          dismissLoader();
        }
      });

      // 兜底路径：轮询全局标记（防止事件漏收或时序问题）
      var statusEl = document.getElementById('loader-status');
      var updateStatus = function(msg) { if (statusEl) statusEl.textContent = msg; };
      
      var checkReady = function() {
        if (dismissed) return;
        
        if (window.__NANOFLOW_LAUNCH_SHELL_VISIBLE__ === true) {
          dismissLoader();
          return;
        }
        
        var elapsed = Date.now() - startTime;
        if (elapsed > 3000) updateStatus('加载中，请稍候...');
        if (elapsed > 6000) updateStatus('加载时间较长，可能是网络问题...');
        
        if (elapsed < 25000) {
          setTimeout(checkReady, 100);
        } else {
          // 超时 - 显示带缓存清理按钮的提示
          var loader = document.getElementById('initial-loader');
          if (loader) {
            loader.innerHTML = '<div style="text-align:center;padding:2rem;">' +
              '<h2 style="color:#dc2626;">加载超时</h2>' +
              '<p style="color:#666;margin:1rem 0;">应用加载时间过长，可能是缓存问题导致。</p>' +
              '<div style="display:flex;gap:0.5rem;justify-content:center;margin-top:1rem;flex-wrap:wrap;">' +
              '<button onclick="location.reload()" style="padding:0.5rem 1rem;background:#4f46e5;color:#fff;border:none;border-radius:4px;cursor:pointer;">刷新</button>' +
              '<button onclick="if(window.__NANOFLOW_FORCE_CLEAR_CACHE__)window.__NANOFLOW_FORCE_CLEAR_CACHE__();else{caches.keys().then(function(k){return Promise.all(k.map(function(n){return caches.delete(n)}))}).then(function(){location.reload()})}" style="padding:0.5rem 1rem;background:#dc2626;color:#fff;border:none;border-radius:4px;cursor:pointer;">清除缓存</button>' +
              '</div></div>';
          }
        }
      };
      
      setTimeout(checkReady, 100);
    })();
  </script>
